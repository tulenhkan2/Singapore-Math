<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Luyện Tập Toán</title>
</head>
<body>

  <h1>Hệ Thống Bài Tập Toán</h1>

  <!-- Thanh chọn Lớp và Dạng toán -->
  <label for="gradeSelect">Chọn khối lớp:</label>
  <select id="gradeSelect">
    <option value="">-- Chọn Lớp --</option>
    <option value="lop4">Lớp 4</option>
    <option value="lop5">Lớp 5</option>
    <option value="lop6">Lớp 6</option>
    <option value="lop7">Lớp 7</option>
    <option value="lop8">Lớp 8</option>
  </select>

  <label for="topicSelect">Chọn dạng toán:</label>
  <select id="topicSelect" disabled>
    <option value="">-- Chọn Dạng Toán --</option>
  </select>

  <!-- Khu vực hiển thị danh sách 20 bài -->
  <hr>
  <div id="exerciseList"></div>

  <!-- Nhúng file app.js dưới dạng module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
